name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'   # Срабатывает при git push тега, например v1.0.0

jobs:
  build-launcher:
    name: Build Launcher (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: launcher/package-lock.json

      - name: Install launcher dependencies
        working-directory: launcher
        run: npm ci

      - name: Build launcher
        working-directory: launcher
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-installer
          path: launcher/dist/*.exe
          retention-days: 5

  build-auth-server:
    name: Package Auth Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: auth-server/package-lock.json

      - name: Install dependencies (production only)
        working-directory: auth-server
        run: npm ci --omit=dev

      - name: Create auth-server archive
        run: |
          zip -r auth-server.zip auth-server/ \
            --exclude "auth-server/data/*" \
            --exclude "auth-server/*.log"

      - name: Upload auth-server artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-server
          path: auth-server.zip
          retention-days: 5

  release:
    name: Create GitHub Release
    needs: [build-launcher, build-auth-server]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: MC Launcher ${{ steps.tag.outputs.TAG }}
          tag_name: ${{ steps.tag.outputs.TAG }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.TAG, '-') }}
          body: |
            ## ⛏ MC Launcher ${{ steps.tag.outputs.TAG }}

            ### 📥 Скачать
            | Файл | Описание |
            |------|----------|
            | `MC-Launcher-Setup-*.exe` | Установщик лаунчера для Windows |
            | `auth-server.zip` | Auth-сервер для деплоя на VPS |

            ### 🚀 Установка лаунчера
            1. Скачай `MC-Launcher-Setup-*.exe`
            2. Запусти установщик
            3. Укажи URL своего auth-сервера в настройках

            ### 🖥️ Запуск auth-сервера
            ```bash
            unzip auth-server.zip
            cd auth-server
            node src/index.js
            ```

            > Требуется Node.js 18+
          files: |
            artifacts/launcher-installer/*.exe
            artifacts/auth-server/auth-server.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
