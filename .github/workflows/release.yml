name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-launcher:
    name: Build Launcher (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: launcher/package-lock.json

      - name: Install dependencies
        working-directory: launcher
        run: npm ci

      - name: Build launcher
        working-directory: launcher
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-installer
          path: launcher/dist/*.exe
          retention-days: 5

  release:
    name: Create GitHub Release
    needs: build-launcher
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: MC Launcher ${{ steps.tag.outputs.TAG }}
          tag_name: ${{ steps.tag.outputs.TAG }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.TAG, '-') }}
          body: |
            ## ⛏ MC Launcher ${{ steps.tag.outputs.TAG }}

            ### 📥 Скачать
            | Файл | Описание |
            |------|----------|
            | `MC-Launcher-Setup-*.exe` | Установщик лаунчера для Windows |

            ### 🚀 Установка
            1. Скачай `MC-Launcher-Setup-*.exe`
            2. Запусти установщик
            3. Укажи URL своего auth-сервера в настройках

            ### 🖥️ Auth-сервер
            Auth-сервер вынесен в отдельный репозиторий: [loxjor/mc-auth-server](https://github.com/loxjor/mc-auth-server)

            Инструкции по запуску (Docker и без) — там же.
          files: |
            artifacts/launcher-installer/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
